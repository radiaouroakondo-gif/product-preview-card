<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRODUCT-PREVIEW-CARD</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <img src="./images/image-product-desktop.jpg" alt="perfume" class="img"/>

      <div class="content">
        <div class="text">
          <p class="category">PERFUME</p>
          <h2 class="name">Gabrielle Essence Eau De Parfum</h2>
          <p class="description">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
        </div>

        <div class="price"> 
          <h3 class="de-price">$149.99</h3>
          <p class="original-price">$169.99</p>
        </div>

        <div class="card__add">
          <img src="./images/icon-cart.svg" alt="icon" class="card__add--icon" />
          <span class="button">Add to Cart</span>
        </div>
      </div>
    </div>
  </body>
</html>
